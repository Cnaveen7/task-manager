services:

  postgres:
    image: postgres:17

    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: todo_db

    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    image: 0naveen/task-manager:latest

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres

volumes:
  postgres_data:
